{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form action="{{ url_for('tasks.create_task') }}" method="POST" class="d-flex gap-2">
            <input type="text" name="title" class="form-control form-control-lg" placeholder="今天要完成什麼？" required autofocus>
            <button type="submit" class="btn btn-primary btn-lg px-4">
                <i class="bi bi-plus-lg"></i> 新增
            </button>
        </form>
    </div>
</div>

<div class="list-group shadow-sm">
    {% if tasks %}
        {% for task in tasks %}
            <div class="list-group-item task-item d-flex justify-content-between align-items-center py-3 {% if task.is_completed %}bg-light{% endif %}">
                
                <div class="d-flex align-items-center flex-grow-1">
                    <!-- 狀態切換表單 -->
                    <form action="{{ url_for('tasks.toggle_task', id=task.id) }}" method="POST" class="me-3 m-0 p-0 d-inline-block">
                        <button type="submit" class="btn btn-link text-decoration-none p-0 text-dark">
                            {% if task.is_completed %}
                                <i class="bi bi-check-circle-fill text-success fs-4"></i>
                            {% else %}
                                <i class="bi bi-circle text-secondary fs-4"></i>
                            {% endif %}
                        </button>
                    </form>
                    
                    <!-- 任務標題 -->
                    <span class="fs-5 {% if task.is_completed %}completed-task{% endif %}">
                        {{ task.title }}
                    </span>
                </div>

                <!-- 刪除按鈕表單 -->
                <form action="{{ url_for('tasks.delete_task', id=task.id) }}" method="POST" class="m-0 p-0" onsubmit="return confirm('確定要刪除這個任務嗎？');">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <div class="list-group-item py-5 text-center text-muted">
            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
            <p class="mb-0 fs-5">目前沒有待辦事項，趕快新增一個吧！</p>
        </div>
    {% endif %}
</div>
{% endblock %}
